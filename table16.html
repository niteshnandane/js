<!DOCTYPE html>
<html>
<head>
<title>
table 
</title>
</head>
<body>
<table id="t" border="1" cellpadding="5" cellspacing="0">

<script>

for(var i=1;i<=10;i++)
{
document.write("<tr>");
for(var j=1;j<=100;j++)
{
document.write("<td>"+(i*j)+"</td>");
}
document.write("</tr>");
}
document.getElementById("t").style.background="url('img4.jpg')";
document.getElementById("t").style.color="yellow";
</script>
</table>
</body>
</html>
