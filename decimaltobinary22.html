<!DOCTYPE html>
<html>
<head>
<title>

function show
</title>
<script>

function show(){
var num=prompt("enter decimal number");
var ans=0;
var pw=1;
while(num>0){
var digit=num%2;
ans=ans+(digit*pw);
pw=pw*10;
num=Math.floor(num/2);
}
document.write(ans)
}

</script>
</head>
<body>
<button onclick="show()"> click me</button>
</body>
</html>
